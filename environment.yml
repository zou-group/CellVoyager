# CellVoyager environment
name: CellVoyager
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - anndata
  - scanpy
  - igraph
  - python-igraph
  - leidenalg
  - h5py
  - instructor
  - litellm
  - pillow
  - nbformat
  - nbconvert
  - ipykernel
  - tqdm
  - python-dotenv
  - pip
  - pip:
      - openai
      - anthropic
      - celltypist
      - streamlit
      - streamlit-extras
      - claude-agent-sdk
